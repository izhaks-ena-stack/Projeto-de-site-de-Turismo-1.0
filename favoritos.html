<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoritos – Explora Minas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <img src="assets/img/logo.png" alt="Logo" width="90" class="me-2">
    <a class="navbar-brand fw-bold" href="index.html">Explora Minas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html#destaques">Destaques</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#cidades">Cidades</a></li>
        <li class="nav-item"><a class="nav-link active" href="favoritos.html">❤️ Favoritos</a></li>
        <li class="nav-item" id="nav-admin" style="display:none;">
          <a class="nav-link" href="admin.html">⚙️ Admin</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" data-bs-toggle="dropdown">
            <span>👤</span>
            <span id="nav-user-nome"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item-text text-muted small" id="nav-user-email"></span></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="Auth.logout()">🚪 Sair</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container flex-fill mt-4 mb-5">
  <h2 class="mb-4">❤️ Meus Favoritos</h2>
  <div class="row" id="lista-favoritos"></div>
  <div id="vazio" class="text-center py-5 d-none">
    <div style="font-size:3rem;">🤍</div>
    <p class="text-muted mt-2">Você ainda não possui itens favoritos cadastrados.</p>
    <a href="index.html" class="btn btn-success mt-2">Explorar cidades</a>
  </div>
</main>

<footer class="bg-success text-white text-center py-3 mt-auto">
  <p class="mb-0">2026 Explora Minas · Izhak Sena</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/auth.js"></script>
<script>
  // redireciona para login se não autenticado
  if (!Auth.getSessao()) window.location.href = 'login.html';

  const sessao = Auth.getSessao();
  if (sessao) {
    document.getElementById('nav-user-nome').textContent = sessao.nome;
    document.getElementById('nav-user-email').textContent = sessao.email;
    if (sessao.perfil === 'admin') document.getElementById('nav-admin').style.display = '';
  }

  function renderFavoritos() {
    const cidades = Auth.getCidades();
    const favIds = Auth.getFavoritos();
    const lista = cidades.filter(c => favIds.includes(c.id));
    const container = document.getElementById('lista-favoritos');
    const vazio = document.getElementById('vazio');
    container.innerHTML = '';

    if (!lista.length) { vazio.classList.remove('d-none'); return; }
    vazio.classList.add('d-none');

    lista.forEach(c => {
      const col = document.createElement('div');
      col.className = 'col-md-4 mb-4';
      col.innerHTML = `
        <div class="card h-100 shadow-sm">
          <img src="${c.imagem_principal}" class="card-img-top" alt="${c.nome}" style="height:180px;object-fit:cover;">
          <div class="card-body">
            <h5 class="card-title">${c.nome}</h5>
            <p class="card-text text-muted">${c.descricao}</p>
          </div>
          <div class="card-footer d-flex flex-column gap-2">
            <a href="detalhe.html?id=${c.id}" class="btn btn-success w-100">Ver detalhes</a>
            <button class="btn btn-outline-danger w-100" onclick="removerFavorito(${c.id})">
              🗑️ Remover dos favoritos
            </button>
          </div>
        </div>`;
      container.appendChild(col);
    });
  }

  function removerFavorito(id) {
    Auth.toggleFavorito(id);
    renderFavoritos();
  }

  renderFavoritos();
</script>
</body>
</html>
