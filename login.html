<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – Explora Minas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { background: linear-gradient(135deg, #1a6b3a 0%, #0d3d22 100%); min-height: 100vh; }
    .auth-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      max-width: 420px;
      width: 100%;
    }
    .auth-logo { width: 72px; }
    .tab-btn {
      border: none; background: none; font-weight: 600; padding: 8px 28px;
      border-radius: 8px; color: #6c757d; transition: all .2s;
    }
    .tab-btn.active { background: #198754; color: #fff; }
    .form-control:focus { border-color: #198754; box-shadow: 0 0 0 .2rem rgba(25,135,84,.25); }
    .btn-green { background: #198754; color: #fff; border: none; }
    .btn-green:hover { background: #146c43; color: #fff; }
    .alert { font-size: .88rem; }
    .perfil-badge { display:inline-block; padding: 2px 10px; border-radius:20px; font-size:.75rem; font-weight:600; }
    .perfil-admin { background:#fff3cd; color:#856404; }
    .perfil-usuario { background:#d1e7dd; color:#0a3622; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center py-5">

<div class="auth-card p-4 p-md-5">
  <!-- logo -->
  <div class="text-center mb-4">
    <img src="assets/img/logo.png" alt="Explora Minas" class="auth-logo mb-2">
    <h4 class="fw-bold text-success mb-0">Explora Minas</h4>
    <p class="text-muted small">Sua conta de viajante mineiro</p>
  </div>

  <!-- tabs -->
  <div class="d-flex gap-2 mb-4 justify-content-center">
    <button class="tab-btn active" id="tab-login" onclick="mostrarAba('login')">Entrar</button>
    <button class="tab-btn" id="tab-cadastro" onclick="mostrarAba('cadastro')">Criar conta</button>
  </div>

  <!-- alerta -->
  <div id="alerta" class="alert d-none mb-3"></div>

  <!-- forms do login -->
  <form id="form-login" onsubmit="fazerLogin(event)">
    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail</label>
      <input type="email" id="login-email" class="form-control" placeholder="seu@email.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input type="password" id="login-senha" class="form-control" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-green w-100 py-2 fw-bold">Entrar →</button>
    <p class="text-center mt-3 small text-muted">
      Conta admin padrão: <code>admin@explora.mg</code> / <code>admin123</code>
    </p>
  </form>

  <!-- forms cadastro -->
  <form id="form-cadastro" class="d-none" onsubmit="fazerCadastro(event)">
    <div class="mb-3">
      <label class="form-label fw-semibold">Nome</label>
      <input type="text" id="cad-nome" class="form-control" placeholder="Seu nome completo" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">E-mail</label>
      <input type="email" id="cad-email" class="form-control" placeholder="seu@email.com" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Senha</label>
      <input type="password" id="cad-senha" class="form-control" placeholder="Mínimo 6 caracteres" minlength="6" required>
    </div>
    <button type="submit" class="btn btn-green w-100 py-2 fw-bold">Criar conta →</button>
  </form>
</div>

<script src="assets/js/auth.js"></script>
<script>
function mostrarAba(aba) {
  document.getElementById('form-login').classList.toggle('d-none', aba !== 'login');
  document.getElementById('form-cadastro').classList.toggle('d-none', aba !== 'cadastro');
  document.getElementById('tab-login').classList.toggle('active', aba === 'login');
  document.getElementById('tab-cadastro').classList.toggle('active', aba === 'cadastro');
  esconderAlerta();
}

function mostrarAlerta(msg, tipo = 'danger') {
  const el = document.getElementById('alerta');
  el.className = `alert alert-${tipo}`;
  el.textContent = msg;
}
function esconderAlerta() {
  document.getElementById('alerta').className = 'alert d-none';
}

function fazerLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;
  const resultado = Auth.login(email, senha);
  if (resultado.ok) {
    mostrarAlerta('Login realizado! Redirecionando…', 'success');
    setTimeout(() => { window.location.href = resultado.perfil === 'admin' ? 'admin.html' : 'index.html'; }, 800);
  } else {
    mostrarAlerta(resultado.erro);
  }
}

function fazerCadastro(e) {
  e.preventDefault();
  const nome = document.getElementById('cad-nome').value.trim();
  const email = document.getElementById('cad-email').value.trim();
  const senha = document.getElementById('cad-senha').value;
  const resultado = Auth.cadastrar(nome, email, senha);
  if (resultado.ok) {
    mostrarAlerta('Conta criada! Faça login para continuar.', 'success');
    mostrarAba('login');
    document.getElementById('login-email').value = email;
  } else {
    mostrarAlerta(resultado.erro);
  }
}
</script>

</body>
</html>
