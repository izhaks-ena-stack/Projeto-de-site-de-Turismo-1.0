<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explora Minas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .visitado-badge {
      position:absolute; top:8px; right:8px;
      background:#198754; color:#fff; border-radius:20px;
      font-size:.72rem; padding:2px 10px; font-weight:600;
    }
    .card-img-wrapper { position:relative; }
    .btn-visitado.marcado { background:#198754; color:#fff; border-color:#198754; }
    #perfil-dropdown { cursor:pointer; }
    .nav-user-name { max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #meus-visitados-section { display:none; }
  </style>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- navegacao -->
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <img src="assets/img/logo.png" alt="Logo" width="90" class="me-2">
    <a class="navbar-brand fw-bold" href="index.html"> Explora Minas </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="#destaques">Destaques</a></li>
        <li class="nav-item"><a class="nav-link" href="#cidades">Cidades</a></li>
        <li class="nav-item" id="nav-meus-visitados" style="display:none;">
          <a class="nav-link" href="#" onclick="toggleMeusVisitados()">⭐ Meus visitados</a>
        </li>
        <li class="nav-item" id="nav-admin" style="display:none;">
          <a class="nav-link" href="admin.html">⚙️ Admin</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <!-- Não logado -->
        <li class="nav-item" id="nav-login">
          <a class="nav-link btn btn-outline-light btn-sm px-3 my-1" href="login.html">Entrar</a>
        </li>
        <!-- Logado -->
        <li class="nav-item dropdown" id="nav-perfil" style="display:none;">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" id="perfil-dropdown" data-bs-toggle="dropdown">
            <span style="font-size:1.2rem;">👤</span>
            <span class="nav-user-name" id="nav-user-nome"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item-text text-muted small" id="nav-user-email"></span></li>
            <li><span class="dropdown-item-text text-muted small" id="nav-user-perfil"></span></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="Auth.logout()">🚪 Sair</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="flex-fill">

  <!-- Meus Visitados (painel oculto) -->
  <section id="meus-visitados-section" class="container mt-4 mb-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="mb-0">⭐ Meus Lugares Visitados</h4>
      <button class="btn btn-sm btn-outline-secondary" onclick="toggleMeusVisitados()">Fechar</button>
    </div>
    <div class="row" id="visitados-container">
      <p class="text-muted">Nenhum lugar marcado como visitado ainda.</p>
    </div>
  </section>

  <!-- 1: Carrossel -->
  <section id="destaques" class="mb-5">
    <div class="container mt-4">
      <h3 class="mb-3">🌟 Cidades em Destaque 🌟</h3>
    </div>
    <div id="carrossel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner" id="carrossel-inner"></div>
      <button class="carousel-control-prev" type="button" data-bs-target="#carrossel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#carrossel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

  <!-- 2: Todos os cards -->
  <section id="cidades" class="container mb-5">
    <h3 class="mb-4">🗺️ Todas as Cidades 🗺️</h3>
    <div class="row" id="cards-container"></div>
  </section>

</main>

<footer class="bg-success text-white text-center py-3">
  <p class="mb-0">© 2026 Explora Minas · Feito por Izhak Sena</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/auth.js"></script>
<script>

// ── Navbar auth ───────────────────────────────────────────────────────
const sessao = Auth.getSessao();
if (sessao) {
  document.getElementById('nav-login').style.display = 'none';
  document.getElementById('nav-perfil').style.display = '';
  document.getElementById('nav-user-nome').textContent = sessao.nome;
  document.getElementById('nav-user-email').textContent = sessao.email;
  document.getElementById('nav-user-perfil').textContent = sessao.perfil === 'admin' ? '👑 Administrador' : '👤 Usuário';
  document.getElementById('nav-meus-visitados').style.display = '';
  if (sessao.perfil === 'admin') document.getElementById('nav-admin').style.display = '';
}

// ── Carrossel com dados do localStorage ──────────────────────────────
function montarCarrossel() {
  const cidades = Auth.getCidades();
  const destaques = cidades.filter(c => c.destaque);
  const inner = document.getElementById("carrossel-inner");
  if (!inner) return;
  destaques.forEach((cidade, index) => {
    const item = document.createElement("div");
    item.className = "carousel-item" + (index === 0 ? " active" : "");
    item.innerHTML = `
      <img src="${cidade.imagem_principal}" class="d-block w-100" alt="${cidade.nome}" style="height:420px; object-fit:cover;">
      <div class="carousel-caption d-none d-md-block bg-dark bg-opacity-50 rounded p-2">
        <h5>${cidade.nome}</h5>
        <p>${cidade.descricao}</p>
        <a href="detalhe.html?id=${cidade.id}" class="btn btn-sm btn-light">Ver detalhes</a>
      </div>
    `;
    inner.appendChild(item);
  });
}

// ── Cards com botão visitado por usuário ─────────────────────────────
function montarCards() {
  const container = document.getElementById("cards-container");
  if (!container) return;
  const cidades = Auth.getCidades();
  const visitados = sessao ? Auth.getVisitados() : JSON.parse(localStorage.getItem("visitados")) || [];

  cidades.forEach(cidade => {
    const col = document.createElement("div");
    col.className = "col-md-4 mb-4";
    const estaVisitado = visitados.includes(cidade.id);
    col.innerHTML = `
      <div class="card h-100 shadow-sm">
        <div class="card-img-wrapper">
          <img src="${cidade.imagem_principal}" class="card-img-top" alt="${cidade.nome}" style="height:200px; object-fit:cover;">
          ${estaVisitado ? '<span class="visitado-badge">✅ Visitado</span>' : ''}
        </div>
        <div class="card-body">
          <h5 class="card-title">${cidade.nome}</h5>
          <p class="card-text">${cidade.descricao}</p>
        </div>
        <div class="card-footer d-flex flex-column gap-2">
          <a href="detalhe.html?id=${cidade.id}" class="btn btn-success w-100">Ver detalhes</a>
          ${sessao
            ? `<button class="btn btn-outline-primary w-100 btn-visitado ${estaVisitado ? 'marcado' : ''}"
                 id="btn-v-${cidade.id}" onclick="toggleVisitadoUI(${cidade.id})">
                 ${estaVisitado ? '✅ Visitado' : '☐ Marcar como visitado'}
               </button>`
            : `<a href="login.html" class="btn btn-outline-secondary w-100">🔒 Entre para marcar</a>`
          }
        </div>
      </div>
    `;
    container.appendChild(col);
  });
}

function toggleVisitadoUI(id) {
  const marcou = Auth.toggleVisitado(id);
  const btn = document.getElementById('btn-v-' + id);
  const card = btn.closest('.card');
  const wrapper = card.querySelector('.card-img-wrapper');
  let badge = wrapper.querySelector('.visitado-badge');

  if (marcou) {
    btn.textContent = '✅ Visitado';
    btn.classList.add('marcado');
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'visitado-badge';
      badge.textContent = '✅ Visitado';
      wrapper.appendChild(badge);
    }
  } else {
    btn.textContent = '☐ Marcar como visitado';
    btn.classList.remove('marcado');
    if (badge) badge.remove();
  }

  if (document.getElementById('meus-visitados-section').style.display !== 'none') {
    renderMeusVisitados();
  }
}

// ── Painel meus visitados ────────────────────────────────────────────
function toggleMeusVisitados() {
  const sec = document.getElementById('meus-visitados-section');
  if (sec.style.display === 'none') {
    sec.style.display = '';
    renderMeusVisitados();
    sec.scrollIntoView({ behavior: 'smooth' });
  } else {
    sec.style.display = 'none';
  }
}

function renderMeusVisitados() {
  const visitados = Auth.getVisitados();
  const cidades = Auth.getCidades();
  const container = document.getElementById('visitados-container');
  const lista = cidades.filter(c => visitados.includes(c.id));
  if (!lista.length) {
    container.innerHTML = '<p class="text-muted col-12">Nenhum lugar marcado como visitado ainda.</p>';
    return;
  }
  container.innerHTML = lista.map(c => `
    <div class="col-md-4 mb-3">
      <div class="card shadow-sm">
        <img src="${c.imagem_principal}" class="card-img-top" style="height:150px; object-fit:cover;">
        <div class="card-body py-2 px-3">
          <h6 class="mb-1">${c.nome}</h6>
          <a href="detalhe.html?id=${c.id}" class="btn btn-sm btn-success w-100 mt-1">Ver detalhes</a>
        </div>
      </div>
    </div>
  `).join('');
}

document.addEventListener("DOMContentLoaded", function () {
  montarCarrossel();
  montarCards();
});
</script>
</body>
</html>
