<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes – Explora Minas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
  <div class="container">
    <img src="assets/img/logo.png" alt="Logo" width="90" class="me-2">
    <a class="navbar-brand fw-bold" href="index.html">Explora Minas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="index.html#destaques">Destaques</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html#cidades">Cidades</a></li>
        <li class="nav-item" id="nav-favoritos" style="display:none;">
          <a class="nav-link" href="favoritos.html">❤️ Favoritos</a>
        </li>
        <li class="nav-item" id="nav-admin" style="display:none;">
          <a class="nav-link" href="admin.html">⚙️ Admin</a>
        </li>
      </ul>
      <ul class="navbar-nav ms-auto">
        <li class="nav-item" id="nav-login">
          <a class="nav-link btn btn-outline-light btn-sm px-3 my-1" href="login.html">Entrar</a>
        </li>
        <li class="nav-item dropdown" id="nav-perfil" style="display:none;">
          <a class="nav-link dropdown-toggle d-flex align-items-center gap-2" href="#" data-bs-toggle="dropdown">
            <span>👤</span><span id="nav-user-nome"></span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><span class="dropdown-item-text text-muted small" id="nav-user-email"></span></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#" onclick="Auth.logout()">🚪 Sair</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="container flex-fill mt-4">
  <section class="mb-5" id="detalhe-info"></section>
  <section class="mb-5">
    <h4 class="mb-3">📸 Atrações</h4>
    <div class="row" id="atracoes-container"></div>
  </section>
</main>

<footer class="bg-success text-white text-center py-3 mt-auto">
  <p class="mb-0">2026 Explora Minas · Izhak Sena</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/auth.js"></script>
<script>
const sessao = Auth.getSessao();
if (sessao) {
  document.getElementById('nav-login').style.display = 'none';
  document.getElementById('nav-perfil').style.display = '';
  document.getElementById('nav-favoritos').style.display = '';
  document.getElementById('nav-user-nome').textContent = sessao.nome;
  document.getElementById('nav-user-email').textContent = sessao.email;
  if (sessao.perfil === 'admin') document.getElementById('nav-admin').style.display = '';
}

function montarDetalhe() {
  const id = parseInt(new URLSearchParams(window.location.search).get('id'));
  const cidade = Auth.getCidades().find(c => c.id === id);
  if (!cidade) {
    document.getElementById('detalhe-info').innerHTML = "<p class='text-danger'>Cidade não encontrada.</p>";
    return;
  }
  document.title = cidade.nome + ' – Explora Minas';

  const isFav = sessao ? Auth.getFavoritos().includes(cidade.id) : false;

  document.getElementById('detalhe-info').innerHTML = `
    <div class="row">
      <div class="col-md-6">
        <img src="${cidade.imagem_principal}" class="img-fluid rounded shadow" alt="${cidade.nome}">
      </div>
      <div class="col-md-6 mt-3 mt-md-0">
        <h2>${cidade.nome}</h2>
        <p class="text-muted">${cidade.estado || ''}</p>
        <p>${cidade.conteudo || cidade.descricao}</p>
        <ul class="list-group mb-3">
          ${cidade.distancia ? `<li class="list-group-item"><strong>📍 Distância:</strong> ${cidade.distancia}</li>` : ''}
          ${cidade.populacao ? `<li class="list-group-item"><strong>👥 População:</strong> ${cidade.populacao}</li>` : ''}
          <li class="list-group-item"><strong>⭐ Destaque:</strong> ${cidade.destaque ? 'Sim' : 'Não'}</li>
        </ul>
        <div class="d-flex gap-2 flex-wrap">
          ${cidade.mapa ? `<a href="${cidade.mapa}" target="_blank" class="btn btn-primary">Ver no mapa 📍</a>` : ''}
          <a href="index.html" class="btn btn-outline-secondary">← Voltar</a>
          ${sessao
            ? `<button id="btn-fav-detalhe" class="btn ${isFav ? 'btn-danger' : 'btn-outline-danger'}" onclick="toggleFavDetalhe(${cidade.id})">
                 ${isFav ? '❤️ Favoritado' : '🤍 Favoritar'}
               </button>`
            : `<a href="login.html" class="btn btn-outline-secondary">🔒 Entre para favoritar</a>`
          }
        </div>
      </div>
    </div>`;

  const atracoes = document.getElementById('atracoes-container');
  if (atracoes && cidade.atracoes) {
    cidade.atracoes.forEach(a => {
      const col = document.createElement('div');
      col.className = 'col-md-4 mb-4';
      col.innerHTML = `
        <div class="card h-100 shadow-sm">
          <img src="${a.imagem}" class="card-img-top" alt="${a.nome}" style="height:200px;object-fit:cover;"
            onerror="this.src='https://via.placeholder.com/400x200?text=Foto+indisponível'">
          <div class="card-body">
            <h6 class="card-title">${a.nome}</h6>
            <p class="card-text text-muted">${a.descricao}</p>
          </div>
        </div>`;
      atracoes.appendChild(col);
    });
  }
}

function toggleFavDetalhe(id) {
  if (!sessao) { window.location.href = 'login.html'; return; }
  const marcou = Auth.toggleFavorito(id);
  const btn = document.getElementById('btn-fav-detalhe');
  if (btn) {
    btn.textContent = marcou ? '❤️ Favoritado' : '🤍 Favoritar';
    btn.className = marcou ? 'btn btn-danger' : 'btn btn-outline-danger';
  }
}

</script>
</body>
</html>
